<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Task Risk Dashboard</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      color: #172033;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .subtitle {
      margin: 0;
      color: #68738a;
    }

    .live {
      padding: 10px 14px;
      border-radius: 999px;
      background: #eaf7f0;
      color: #19a463;
      font-weight: 700;
      white-space: nowrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat {
      background: white;
      border: 1px solid #dde3ef;
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(25, 36, 60, 0.06);
    }

    .stat span {
      color: #68738a;
      font-size: 14px;
    }

    .stat strong {
      display: block;
      margin-top: 8px;
      font-size: 28px;
    }

    .panel {
      background: white;
      border: 1px solid #dde3ef;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(25, 36, 60, 0.06);
    }

    .panel-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .panel h2 {
      margin: 0;
    }

    button {
      border: 0;
      background: #356dff;
      color: white;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .history {
      display: grid;
      gap: 12px;
    }

    .event {
      display: grid;
      grid-template-columns: 150px 1fr 170px;
      gap: 16px;
      align-items: center;
      border: 1px solid #dde3ef;
      border-radius: 18px;
      padding: 16px;
      background: #fbfcff;
    }

    .time {
      color: #68738a;
      font-size: 13px;
    }

    .main strong {
      display: block;
      margin-bottom: 5px;
      font-size: 16px;
    }

    .main span {
      display: block;
      color: #68738a;
      font-size: 14px;
      line-height: 1.4;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .badge {
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #edf1f7;
      color: #3d4a61;
    }

    .low {
      background: #e9f8f0;
      color: #19a463;
    }

    .medium {
      background: #fff5dc;
      color: #d99100;
    }

    .high {
      background: #ffe9e9;
      color: #d93434;
    }

    .unknown {
      background: #edf1f7;
      color: #68738a;
    }

    .empty {
      padding: 34px;
      text-align: center;
      color: #68738a;
      border: 1px dashed #dde3ef;
      border-radius: 18px;
    }

    .toasts {
      position: fixed;
      right: 24px;
      bottom: 24px;
      display: grid;
      gap: 12px;
      z-index: 100;
    }

    .toast {
      width: 360px;
      background: white;
      border: 1px solid #dde3ef;
      border-left: 6px solid #356dff;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 16px 40px rgba(25, 36, 60, 0.12);
      animation: slideIn 0.25s ease-out;
    }

    .toast.high {
      border-left-color: #d93434;
    }

    .toast.medium {
      border-left-color: #d99100;
    }

    .toast.low {
      border-left-color: #19a463;
    }

    .toast strong {
      display: block;
      margin-bottom: 6px;
    }

    .toast p {
      margin: 0;
      color: #68738a;
      line-height: 1.35;
      font-size: 14px;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 820px) {
      .header,
      .panel-top {
        flex-direction: column;
        align-items: flex-start;
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .event {
        grid-template-columns: 1fr;
      }

      .badges {
        justify-content: flex-start;
      }

      .toast {
        width: calc(100vw - 40px);
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="header">
      <div>
        <h1>Task Risk Dashboard</h1>
        <p class="subtitle">История изменений задач и уведомления о сработавших триггерах</p>
      </div>

      <div class="live" id="connection">Live connected</div>
    </header>

    <section class="stats">
      <div class="stat">
        <span>Всего событий</span>
        <strong id="totalCount">0</strong>
      </div>

      <div class="stat">
        <span>Новые задачи</span>
        <strong id="newCount">0</strong>
      </div>

      <div class="stat">
        <span>Смена статуса</span>
        <strong id="statusCount">0</strong>
      </div>

      <div class="stat">
        <span>Высокий риск</span>
        <strong id="highRiskCount">0</strong>
      </div>
    </section>

    <main class="panel">
      <div class="panel-top">
        <h2>История изменений</h2>
        <button onclick="showDemoEvent()">Показать демо-триггер</button>
      </div>

      <div class="history" id="history">
        <div class="empty">Пока событий нет. Когда webhook сработает, изменения появятся здесь.</div>
      </div>
    </main>
  </div>

  <div class="toasts" id="toasts"></div>

  <script>
    const historyEl = document.getElementById("history");
    const toastsEl = document.getElementById("toasts");
    const connectionEl = document.getElementById("connection");

    let events = [];

    function riskClass(level) {
      if (level === "high") return "high";
      if (level === "medium") return "medium";
      if (level === "low") return "low";
      return "unknown";
    }

    function riskText(level) {
      if (level === "high") return "Высокий риск";
      if (level === "medium") return "Средний риск";
      if (level === "low") return "Низкий риск";
      return "Риск не рассчитан";
    }

    function triggerText(code) {
      if (code === "new_task") return "Новая задача";
      if (code === "status_changed") return "Изменился статус";
      if (code === "task_updated") return "Изменение задачи";
      return "Изменение задачи";
    }

    function renderStats() {
      document.getElementById("totalCount").textContent = events.length;

      document.getElementById("newCount").textContent =
        events.filter(event => event.trigger_code === "new_task").length;

      document.getElementById("statusCount").textContent =
        events.filter(event => event.trigger_code === "status_changed").length;

      document.getElementById("highRiskCount").textContent =
        events.filter(event => event.risk_level === "high").length;
    }

    function createEventCard(event) {
      const score = event.risk_score === null || event.risk_score === undefined
        ? "—"
        : event.risk_score;

      const card = document.createElement("div");
      card.className = "event";

      card.innerHTML = `
        <div class="time">${event.time || ""}</div>

        <div class="main">
          <strong>${triggerText(event.trigger_code)}: ${event.issue}</strong>
          <span>${event.title}</span>
          <span>Статус: ${event.status || "unknown"} · Исполнитель: ${event.assignee || "unknown"}</span>
        </div>

        <div class="badges">
          <div class="badge ${riskClass(event.risk_level)}">${riskText(event.risk_level)}</div>
          <div class="badge">score ${score}</div>
        </div>
      `;

      return card;
    }

    function renderHistory() {
      historyEl.innerHTML = "";

      if (!events.length) {
        historyEl.innerHTML = `
          <div class="empty">
            Пока событий нет. Когда webhook сработает, изменения появятся здесь.
          </div>
        `;
        renderStats();
        return;
      }

      events.forEach(event => {
        historyEl.appendChild(createEventCard(event));
      });

      renderStats();
    }

    function addEvent(event) {
      events = [event, ...events].slice(0, 100);
      renderHistory();
    }

    function showToast(event) {
      const score = event.risk_score === null || event.risk_score === undefined
        ? "—"
        : event.risk_score;

      const toast = document.createElement("div");
      toast.className = `toast ${riskClass(event.risk_level)}`;

      toast.innerHTML = `
        <strong>${triggerText(event.trigger_code)}: ${event.issue}</strong>
        <p>${event.title}</p>
        <p>${riskText(event.risk_level)} · score ${score}</p>
      `;

      toastsEl.appendChild(toast);

      setTimeout(() => {
        toast.remove();
      }, 6500);
    }

    async function loadHistory() {
      try {
        const response = await fetch("/api/history");
        events = await response.json();
        renderHistory();
      } catch (error) {
        console.error(error);
      }
    }

    function connectEvents() {
      const source = new EventSource("/events");

      source.onopen = () => {
        connectionEl.textContent = "Live connected";
        connectionEl.style.background = "#eaf7f0";
        connectionEl.style.color = "#19a463";
      };

      source.onmessage = (message) => {
        const event = JSON.parse(message.data);
        addEvent(event);
        showToast(event);
      };

      source.onerror = () => {
        connectionEl.textContent = "Reconnecting...";
        connectionEl.style.background = "#fff5dc";
        connectionEl.style.color = "#d99100";
      };
    }

    function showDemoEvent() {
      const demo = {
        id: "demo-" + Date.now(),
        time: new Date().toLocaleString("ru-RU"),
        trigger_code: "status_changed",
        trigger_label: "Изменился статус",
        issue: "DEMO-123",
        title: "Подготовить модель оценки риска дедлайна",
        status: "In Progress",
        assignee: "demo user",
        risk_score: 0.74,
        risk_level: "high"
      };

      addEvent(demo);
      showToast(demo);
    }

    loadHistory();
    connectEvents();
  </script>
</body>
</html>
